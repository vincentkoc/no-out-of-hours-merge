name: Test No Out Hours Merge Action

on:
    pull_request:
        types: [opened, synchronize, edited]
    push:
        branches:
            - main

concurrency:
    group: environment-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read
    issues: write
    pull-requests: write

jobs:
    test:
        name: Test github action 🧪
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Import .env File
              shell: bash
              run: cat .env >>${GITHUB_ENV}

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: 3.x

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements-dev.txt

            - name: Run tests 🧪
              run: |
                  python -m unittest discover -t ./src/ -s ./src/tests

            - name: Test Restrict PR Merge Action 🧪
              uses: ./ # Use an action in the same repository
              with:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  PR_TITLE: ${{ github.event.pull_request.title || github.event.head_commit.message }}
                  TIMEZONE: Australia/Sydney
                  RESTRICTED_TIMES: >-
                      {
                        "weekly": [
                          {
                            "days": ["mon", "tue", "wed", "thu", "fri"],
                            "intervals": [[0, 1]]
                          }
                        ],
                        "dates": [],
                        "holidays": {}
                      }
                  CUSTOM_MESSAGE: ⚠️ **PR merging is not allowed outside business hours.** ⚠️
                  CHECK_EXISTING_COMMENT: 'true'
